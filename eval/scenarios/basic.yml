scenarios:
  - id: smoke-direct-answer
    name: "Simple direct answer (no tools)"
    prompt: "What is 2 + 2?"
    expected_patterns: ["4"]
    forbidden_tools: ["web_search", "bash", "python"]
    max_rounds: 2
    tags: ["smoke", "qa"]

  - id: smoke-trivia
    name: "General knowledge question"
    prompt: "What is the capital of France?"
    expected_patterns: ["Paris"]
    forbidden_tools: ["bash", "python"]
    max_rounds: 3
    tags: ["smoke", "qa"]

  - id: smoke-code-python
    name: "Simple Python code generation"
    prompt: "Write a Python function that checks if a string is a palindrome."
    expected_tools: ["create_document"]
    expected_patterns: ["def|is_palindrome|palindrome"]
    forbidden_tools: ["bash", "web_search"]
    max_rounds: 3
    tags: ["smoke", "code"]

  - id: search-current-event
    name: "Web search for current info"
    prompt: "Who won the latest Formula 1 race?"
    expected_tools: ["web_search"]
    forbidden_tools: ["bash", "python"]
    min_rounds: 1
    max_rounds: 5
    tags: ["search", "knowledge"]

  - id: search-definition
    name: "Look up a definition"
    prompt: "What does 'ubiquitous' mean?"
    expected_tools: ["web_search"]
    forbidden_tools: ["bash", "python"]
    max_rounds: 3
    tags: ["search", "knowledge"]

  - id: multi-step-reasoning
    name: "Multi-step reasoning with search"
    prompt: "Compare the population of Japan and Germany. Which is larger and by how much?"
    expected_tools: ["web_search"]
    expected_patterns: ["Japan|Germany|population"]
    max_rounds: 5
    tags: ["reasoning", "search"]

  - id: write-file
    name: "Write a file"
    prompt: "Write a hello world Python script to hello.py"
    expected_tools: ["write_file"]
    forbidden_tools: ["bash", "python"]
    max_rounds: 3
    tags: ["file", "write"]

  - id: memory-store-recall
    name: "Store and recall a memory"
    prompt: "Remember that my favorite color is blue. Then tell me what my favorite color is."
    expected_tools: ["manage_memory"]
    expected_patterns: ["blue"]
    max_rounds: 4
    tags: ["memory"]

  - id: edge-empty-response
    name: "Edge case: empty prompt"
    prompt: ""
    max_rounds: 1
    tags: ["edge"]

  - id: edge-tool-loop
    name: "Edge case: potential tool loop"
    prompt: "Search the web for 'weather in Tokyo'. Then search for 'weather in London'. Then search for 'weather in Paris'."
    expected_tools: ["web_search"]
    max_rounds: 8
    tags: ["edge", "search"]

  - id: code-explanation
    name: "Explain a code concept"
    prompt: "Explain what a Python decorator is and give an example."
    forbidden_tools: ["bash", "python"]
    expected_patterns: ["decorator|@"]
    max_rounds: 3
    tags: ["code", "knowledge"]

  - id: math-calculation
    name: "Calculate using Python"
    prompt: "Calculate the compound interest on $10000 at 5% for 10 years."
    expected_tools: ["create_document"]
    expected_patterns: ["16288\\.95|compound"]
    max_rounds: 3
    tags: ["code", "math"]

  - id: multi-tool-sequence
    name: "Multi-tool sequence"
    prompt: "Search for the latest Mars rover news, then write a summary to mars_summary.txt"
    expected_tools: ["web_search", "write_file"]
    max_rounds: 5
    tags: ["multi-tool", "search", "file"]

  - id: code-debug
    name: "Debug a code snippet"
    prompt: "This Python code has a bug:\n```python\ndef add(a, b):\n    return a + b\n\nresult = add(5)\n```\nFix the bug and explain."
    expected_tools: ["create_document"]
    expected_patterns: ["missing|argument|parameter|default"]
    max_rounds: 4
    tags: ["code", "debug"]

  - id: constrained-tools
    name: "Work without search"
    prompt: "Write a haiku about programming."
    forbidden_tools: ["web_search", "bash", "python"]
    expected_patterns: ["^[^\n]*\n[^\n]*\n[^\n]*$|haiku"]
    max_rounds: 2
    tags: ["constraint", "creative"]
