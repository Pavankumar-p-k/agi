<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS — Neural OS</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- BURST CANVAS -->
<canvas id="burst-canvas"></canvas>

<!-- MAIN LAYOUT -->
<div id="layout">

  <!-- TOPBAR -->
  <div id="topbar">
    <span class="tb-logo">JARVIS</span>
    <div class="tb-sep"></div>
    <div class="tb-status">
      <div class="status-ring" id="status-ring"></div>
      <span id="status-txt">ONLINE</span>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-status" id="intensity-display">INTENSITY 0%</div>
    <span id="entity-tag"></span>
    <div class="tb-sep"></div>
    <div class="tb-time" id="clock">00:00:00</div>
  </div>

  <!-- CHAT (left) -->
  <div id="chat">
    <div id="chat-messages">
      <div class="msg jarvis">
        <div class="msg-role">jarvis</div>
        <div class="msg-body">Neural OS online. All systems operational. Ask me anything — I will visualize, reason, and present structured intelligence.</div>
      </div>
    </div>
  </div>

  <!-- ORB (center) -->
  <div id="orb-area">
    <canvas id="three-canvas"></canvas>
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>
    <div id="orb-label">NEURAL CORE</div>
  </div>

  <!-- CARDS (right) -->
  <div id="cards-panel">
    <div id="cards-header">
      ⬡ <span id="cards-type-label">AWAITING INPUT</span>
    </div>
    <div id="cards-scroll"></div>
    <div id="scroll-dots"></div>
  </div>

  <!-- INPUT BAR (bottom) -->
  <div id="input-bar">
    <span class="input-hint">JARVIS &gt;</span>
    <input id="prompt-input" type="text" placeholder="Ask anything... neural OS is listening"/>
    <button id="send-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 9L16 2L10 16L8.5 10L2 9Z" fill="currentColor"/>
      </svg>
    </button>
  </div>

</div>

<!-- NODE DETAIL PANEL -->
<div id="node-detail">
  <div id="node-detail-header">
    <span id="node-detail-type">MEMORY CELL</span>
    <button id="node-detail-close">✕</button>
  </div>
  <div id="node-detail-body">
    <div id="node-detail-text"></div>
    <div id="node-detail-meta"></div>
  </div>
  <div id="node-detail-footer">
    <span id="node-detail-idx"></span>
    <span id="node-detail-ts"></span>
  </div>
</div>

<!-- SETUP SCREEN -->
<div id="setup">
  <h1>JARVIS</h1>
  <p>Enter your API key to initialize the neural interface.</p>
  <input id="api-in" type="password" placeholder="API Key"/>
  <button id="go-btn">INITIALIZE</button>
</div>

<!-- Three.js + GSAP (globals for module graph.js) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- App entry point -->
<script type="module" src="js/app.js"></script>

</body>
</html>
