<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JarvisHub — Skill Index</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  header { text-align: center; padding: 3rem 0; }
  header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #00c6ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { color: #94a3b8; margin-top: 0.5rem; }
  .filters { display: flex; gap: 1rem; margin: 2rem 0; flex-wrap: wrap; }
  .filters input, .filters select { padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 0.95rem; flex: 1; min-width: 200px; }
  .filters select { cursor: pointer; }
  .stats { display: flex; gap: 2rem; justify-content: center; margin-bottom: 2rem; }
  .stat { text-align: center; }
  .stat-num { font-size: 2rem; font-weight: 700; color: #00c6ff; }
  .stat-label { font-size: 0.85rem; color: #64748b; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; transition: border-color 0.2s, transform 0.2s; }
  .card:hover { border-color: #00c6ff; transform: translateY(-2px); }
  .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem; }
  .card h3 { font-size: 1.1rem; color: #f1f5f9; }
  .card .category { font-size: 0.75rem; background: #334155; padding: 0.2rem 0.6rem; border-radius: 999px; color: #94a3b8; text-transform: capitalize; }
  .card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem; }
  .card .detail { display: flex; gap: 1rem; font-size: 0.8rem; color: #64748b; }
  .card .detail span { display: flex; align-items: center; gap: 0.3rem; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px; font-weight: 600; }
  .badge-loaded { background: #065f46; color: #6ee7b7; }
  .badge-unloaded { background: #374151; color: #94a3b8; }
  .empty { text-align: center; padding: 4rem; color: #64748b; }
  #loading { text-align: center; padding: 4rem; }
  .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #00c6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>JarvisHub</h1>
    <p>Browse, search, and manage JARVIS skills</p>
  </header>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-num" id="total-skills">0</div><div class="stat-label">Total Skills</div></div>
    <div class="stat"><div class="stat-num" id="loaded-skills">0</div><div class="stat-label">Loaded</div></div>
    <div class="stat"><div class="stat-num" id="library-skills">0</div><div class="stat-label">Library</div></div>
  </div>

  <div class="filters">
    <input type="text" id="search" placeholder="Search skills..." oninput="render()">
    <select id="category-filter" onchange="render()">
      <option value="">All Categories</option>
    </select>
    <select id="status-filter" onchange="render()">
      <option value="">All Status</option>
      <option value="loaded">Loaded</option>
      <option value="unloaded">Unloaded</option>
    </select>
  </div>

  <div id="loading"><div class="spinner"></div><p>Loading skill index...</p></div>
  <div class="grid" id="grid"></div>
</div>

<script>
let skills = [];

async function load() {
  try {
    const res = await fetch('/api/jarvishub');
    skills = await res.json();
    document.getElementById('loading').style.display = 'none';
    populateFilters();
    render();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<p>Failed to load skills. Is JARVIS running?</p>';
  }
}

function populateFilters() {
  const cats = new Set(skills.map(s => s.category || 'general'));
  const sel = document.getElementById('category-filter');
  for (const c of [...cats].sort()) {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
    sel.appendChild(opt);
  }
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('category-filter').value;
  const status = document.getElementById('status-filter').value;

  let filtered = skills.filter(s => {
    if (q && !s.name.toLowerCase().includes(q) && !(s.description || '').toLowerCase().includes(q)) return false;
    if (cat && (s.category || 'general') !== cat) return false;
    if (status === 'loaded' && !s.loaded) return false;
    if (status === 'unloaded' && s.loaded) return false;
    return true;
  });

  document.getElementById('total-skills').textContent = skills.length;
  document.getElementById('loaded-skills').textContent = skills.filter(s => s.loaded).length;
  document.getElementById('library-skills').textContent = skills.filter(s => s.type === 'library').length;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No skills match your filters</div>';
    return;
  }
  grid.innerHTML = filtered.map(s => `
    <div class="card">
      <div class="card-header">
        <h3>${s.name}</h3>
        <span class="category">${s.category || 'general'}</span>
      </div>
      <p>${s.description || 'No description'}</p>
      <div class="detail">
        <span>📦 ${s.type || 'unknown'}</span>
        <span>🔧 ${s.tool_count || 0} tools</span>
        <span>📁 ${s.version || '1.0'}</span>
        <span class="badge ${s.loaded ? 'badge-loaded' : 'badge-unloaded'}">${s.loaded ? 'Loaded' : 'Unloaded'}</span>
      </div>
    </div>
  `).join('');
}

load();
</script>
</body>
</html>
