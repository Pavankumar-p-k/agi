  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2

  # Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1
  flutter_contacts: ^1.1.9+2
  call_log: ^5.1.0
  device_calendar: ^4.3.2

  # File Manager
  file_picker: ^8.0.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
