version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4

  # HTTP & Networking
  dio: ^5.4.3
  web_socket_channel: ^2.4.0

  # State Management
  provider: ^6.1.2

  # UI & Animations
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
