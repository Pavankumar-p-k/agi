[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "architecture: marks architecture gate tests",
    "replay: marks replay validation tests (Sprint 5.5B)",
    "trace: marks runtime trace validation tests (Sprint 5.5C)",
    "snapshot: marks snapshot tests (Sprint 5.5D)",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
