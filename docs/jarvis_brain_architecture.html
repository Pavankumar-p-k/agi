<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JARVIS Multi-Agent Brain</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#010A12;--bg2:#061420;--bg3:#0A1E2E;
  --cyan:#00E5FF;--blue:#0066FF;--green:#00FFAA;
  --orange:#FF6A00;--red:#FF1744;--purple:#AA00FF;--yellow:#FFD600;
  --border:#0D3348;--text:#B0EEFF;--dim:#4A7A8A;--vdim:#1E4A5A;
}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,.012) 3px,rgba(0,229,255,.012) 4px);pointer-events:none;z-index:999}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,102,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,102,255,.04) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px}

/* header */
h1{font-family:'Orbitron',sans-serif;font-size:clamp(18px,4vw,34px);font-weight:900;color:var(--cyan);letter-spacing:6px;text-align:center;padding:32px 0 6px;text-shadow:0 0 30px rgba(0,229,255,.4)}
.sub{text-align:center;font-size:11px;letter-spacing:3px;color:var(--dim);margin-bottom:32px}

/* pipeline */
.pipeline{display:flex;flex-direction:column;gap:0;align-items:center;margin-bottom:40px}
.pipe-step{width:100%;max-width:700px;position:relative}
.pipe-arrow{display:flex;justify-content:center;padding:4px 0}
.arrow-svg{width:24px;height:20px}

.step-box{
  border:1px solid var(--step-color,var(--border));
  background:var(--bg2);
  padding:14px 18px;
  position:relative;
  cursor:pointer;
  transition:all .2s;
}
.step-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--step-color,var(--cyan)),transparent)}
.step-box:hover{transform:scale(1.01);box-shadow:0 0 20px rgba(0,229,255,.1)}
.step-head{display:flex;align-items:center;gap:12px}
.step-num{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--step-color,var(--cyan));width:26px;flex-shrink:0}
.step-title{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:2px;color:var(--text);flex:1}
.step-model{font-size:10px;color:var(--step-color,var(--cyan));padding:2px 8px;border:1px solid currentColor;opacity:.8}
.step-desc{font-size:11px;color:var(--dim);margin-top:8px;margin-left:38px;line-height:1.6}
.step-detail{font-size:11px;color:var(--dim);margin-top:8px;margin-left:38px;display:none;border-left:2px solid var(--step-color,var(--cyan));padding-left:10px;line-height:1.8}
.step-box.open .step-detail{display:block}
.step-box.open .step-desc{display:none}

/* route fork */
.fork{width:100%;max-width:820px;background:var(--bg2);border:1px solid var(--border);padding:16px;position:relative}
.fork::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.fork-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--purple);margin-bottom:12px}
.fork-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.model-card{background:var(--bg3);border:1px solid var(--mc-border,var(--border));padding:10px 8px;text-align:center;cursor:pointer;transition:all .2s}
.model-card:hover{border-color:var(--mc-color);box-shadow:0 0 12px var(--mc-color)}
.mc-icon{font-size:20px;margin-bottom:4px}
.mc-name{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;color:var(--mc-color);margin-bottom:3px}
.mc-role{font-size:9px;color:var(--dim);line-height:1.4}
.mc-vram{font-family:'Orbitron',sans-serif;font-size:8px;color:var(--vdim);margin-top:4px}

/* VRAM bar */
.vram-section{margin-bottom:32px}
.vram-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:10px}
.vram-bar-wrap{background:var(--bg2);border:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:8px}
.vbar-row{display:flex;align-items:center;gap:10px}
.vbar-label{font-size:10px;color:var(--text);width:110px;flex-shrink:0}
.vbar-track{flex:1;background:var(--bg3);height:8px;position:relative}
.vbar-fill{height:100%;transition:width 1.5s cubic-bezier(.16,1,.3,1);width:0}
.vbar-num{font-family:'Orbitron',sans-serif;font-size:10px;width:40px;text-align:right;flex-shrink:0}
.vram-total{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:8px;border-top:1px solid var(--border)}

/* routing table */
.table-section{margin-bottom:32px}
.route-table{width:100%;border-collapse:collapse}
.route-table th{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1.5px;color:var(--dim);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left}
.route-table td{font-size:11px;color:var(--text);padding:9px 12px;border-bottom:1px solid rgba(13,51,72,.4)}
.route-table tr:hover td{background:rgba(0,229,255,.03)}
.tag{display:inline-block;font-family:'Orbitron',sans-serif;font-size:8px;padding:2px 7px;border:1px solid currentColor;letter-spacing:1px;margin:1px}

/* perf */
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:32px}
.perf-card{background:var(--bg2);border:1px solid var(--border);padding:14px}
.perf-model{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1.5px;margin-bottom:4px}
.perf-time{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;margin:4px 0}
.perf-bar{height:3px;margin-top:6px;border-radius:1px}
.perf-role{font-size:10px;color:var(--dim);margin-top:4px}

.section-label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--dim);margin:28px 0 12px;display:flex;align-items:center;gap:10px}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border))}
.section-label::before{background:linear-gradient(90deg,transparent,var(--border))}
.section-label::after{background:linear-gradient(90deg,var(--border),transparent)}

@media(max-width:600px){.fork-grid{grid-template-columns:repeat(3,1fr)}.step-model{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <h1>J.A.R.V.I.S</h1>
  <div class="sub">MULTI-AGENT BRAIN — 5 MODELS · RTX 4050 · 100% OFFLINE</div>

  <!-- PIPELINE -->
  <div class="section-label">PIPELINE</div>
  <div class="pipeline" id="pipeline"></div>

  <!-- MODEL ROUTER -->
  <div class="section-label">MODEL ROUTER</div>
  <div style="display:flex;justify-content:center;margin-bottom:32px">
    <div class="fork">
      <div class="fork-title">// SMART ROUTING — click a model to see when it's used</div>
      <div class="fork-grid" id="model-grid"></div>
    </div>
  </div>

  <!-- VRAM -->
  <div class="section-label">VRAM ALLOCATION — RTX 4050 (6GB)</div>
  <div class="vram-bar-wrap" id="vram-bars"></div>

  <!-- ROUTING TABLE -->
  <div class="section-label">ROUTING DECISION TABLE</div>
  <div style="background:var(--bg2);border:1px solid var(--border);overflow:hidden">
    <table class="route-table" id="route-table"></table>
  </div>

  <!-- PERF -->
  <div class="section-label">EXPECTED LATENCY — RTX 4050</div>
  <div class="perf-grid" id="perf-grid"></div>
</div>

<script>
// ── Pipeline steps ──
const steps = [
  {num:'01',title:'INPUT MESSAGE',model:'',color:'var(--cyan)',
   desc:'Message arrives from chat, voice, WhatsApp, Instagram, or call',
   detail:`Supported platforms:\n• Text chat (Flutter app)\n• Voice (TalkBack)\n• WhatsApp automation\n• Instagram DM\n• Call transcript\n\nAlso supports: base64 image (→ llava)`},
  {num:'02',title:'CLASSIFY + EMOTION',model:'qwen2:7b × 2',color:'var(--orange)',
   desc:'Parallel: qwen2 detects intent AND emotion simultaneously',
   detail:`RUNS IN PARALLEL (asyncio.gather):\n\nClassifier returns:\n• intent: greeting/code/emotional/planning...\n• topic: what they're talking about\n• urgency: low/medium/high\n• message_type: casual/normal/deep\n\nEmotion returns:\n• sad/happy/angry/anxious/excited/neutral/love\n\nBoth use qwen2 with temperature=0.05–0.1\n(deterministic = consistent classification)`},
  {num:'03',title:'CONTEXT BUILDER',model:'Memory DB',color:'var(--blue)',
   desc:'Smart 3-layer context: recent msgs + relevant past + user profile',
   detail:`3-Layer Context Injection:\n\nLayer 1 — ALWAYS: Last 8 messages\nLayer 2 — SMART: Keyword/intent/emotion matches from past\nLayer 3 — PROFILE: Known facts about Pavan\n\nBudget: ~3000 chars (~750 tokens)\nAvoids sending full history → faster + smarter\n\nMemory DB (SQLite):\n• messages table\n• user_facts table\n• emotion_log table\n• summaries table`},
  {num:'04',title:'MODEL ROUTER',model:'Decision Logic',color:'var(--purple)',
   desc:'Routes to exact right model based on intent + emotion + message length',
   detail:`Routing Logic:\n\nhas_image      → llava:latest\nsad/angry      → llama3:8b  (empathy)\nurgency=high   → llama3:8b\nadvice/deep    → llama3:8b\ncode/json      → qwen2:7b\ngreeting       → phi3:mini  (<1s)\nlen < 8 words  → phi3:mini\ndefault        → mistral:7b`},
  {num:'05',title:'GENERATOR',model:'phi3/mistral/llama3/qwen2/llava',color:'var(--green)',
   desc:'Chosen model generates reply with tuned system prompt + emotion context',
   detail:`Each model has a TUNED system prompt:\n\nphi3   → "Keep replies SHORT (1-3 sentences)"\nmistral→ "Clear, helpful, 2-4 sentences"\nllama3 → "Emotionally aware, human-like, warm"\nqwen2  → "Analytical, structured, precise"\nllava  → "Analyze image in detail"\n\nEmotion prefixes injected:\n• sad → "Be warm, empathetic, supportive"\n• angry → "Be calm, understanding, patient"\n• excited → "Match their energy!"`},
  {num:'06',title:'QUALITY CHECK',model:'phi3:mini',color:'var(--yellow)',
   desc:'phi3 scores the reply 0.0–1.0. If < 0.55 → auto-retry with llama3',
   detail:`Quality scoring prompt:\n• Does it answer the question?\n• Appropriate for emotion/context?\n• Natural, not robotic?\n• Right length?\n\nScore thresholds:\n≥ 0.55 → Accept reply\n< 0.55 → Retry with llama3:8b\n         (upgraded model, retry=True flag)\n\nPhi3 is used here because:\n→ fastest (< 1s)\n→ cheap (saves VRAM for main model)\n→ good enough for scoring`},
  {num:'07',title:'MEMORY SAVE',model:'SQLite',color:'var(--cyan)',
   desc:'Save user message + reply to DB. Extract user facts in background.',
   detail:`Saved to SQLite (data/jarvis_memory.db):\n• Both user msg + assistant reply\n• With intent, emotion, model, quality score\n• Timestamped, session-tagged\n\nBackground tasks (non-blocking):\n• FactExtractor: phi3 extracts user facts\n  e.g. "I work in Hyderabad" → saves fact\n• EmotionLog: track mood over time\n\nMemory is used next time for context!`},
  {num:'08',title:'BRAIN RESULT',model:'',color:'var(--cyan)',
   desc:'Returns: reply + model_used + intent + emotion + confidence + latency_ms',
   detail:`BrainResult object:\n{\n  reply:       "string",\n  model_used:  "mistral:7b",\n  intent:      "small_talk",\n  emotion:     "happy",\n  confidence:  0.82,\n  latency_ms:  1340,\n  retried:     false,\n  cached:      false\n}\n\nFlutter app receives full metadata\nCan show model badge, emotion indicator, etc.`},
];

// ── Models ──
const models = [
  {icon:'🧠',name:'llama3:8b',role:'Deep reasoning\nEmotional support\nMain Brain',vram:'4.7GB',color:'var(--cyan)',
   when:'Sad/angry emotions, advice, philosophy, high urgency, quality retry fallback'},
  {icon:'⚡',name:'mistral:7b',role:'Normal chat\nFast replies\nDefault model',vram:'4.4GB',color:'var(--blue)',
   when:'Default chat, 8-30 word messages, general conversation'},
  {icon:'📊',name:'qwen2:7b',role:'Classification\nEmotion detect\nStructured output',vram:'4.4GB',color:'var(--orange)',
   when:'Message classification, emotion detection, code tasks, decision/JSON output'},
  {icon:'🚀',name:'phi3:mini',role:'Greetings\nSmall talk\nQuality check',vram:'2.2GB',color:'var(--green)',
   when:'Short messages (<8 words), greetings, quality scoring, fact extraction (always loaded)'},
  {icon:'🖼',name:'llava',role:'Image analysis\nVision tasks\nScreenshot AI',vram:'4.7GB',color:'var(--purple)',
   when:'Any message with an attached image (base64), screenshot analysis'},
];

// ── Routing table ──
const routes = [
  {condition:'Message has image',model:'llava:latest',color:'var(--purple)',tags:['IMAGE']},
  {condition:'emotion = sad / angry / anxious / depressed',model:'llama3:8b',color:'var(--cyan)',tags:['EMOTIONAL']},
  {condition:'urgency = high',model:'llama3:8b',color:'var(--cyan)',tags:['URGENT']},
  {condition:'intent = advice / philosophy / emotional_support',model:'llama3:8b',color:'var(--cyan)',tags:['DEEP']},
  {condition:'intent = code / structured / decision / json',model:'qwen2:7b',color:'var(--orange)',tags:['TECHNICAL']},
  {condition:'intent = greeting / small_talk / acknowledgment',model:'phi3:mini',color:'var(--green)',tags:['CASUAL']},
  {condition:'message length < 8 words',model:'phi3:mini',color:'var(--green)',tags:['SHORT']},
  {condition:'8 – 30 words, normal conversation',model:'mistral:7b',color:'var(--blue)',tags:['NORMAL']},
  {condition:'Default fallback',model:'mistral:7b',color:'var(--blue)',tags:['DEFAULT']},
  {condition:'Quality score < 0.55 (retry)',model:'llama3:8b',color:'var(--red)',tags:['RETRY','AUTO']},
];

// ── Performance ──
const perfs = [
  {model:'phi3:mini',time:'< 1s',bar:95,color:'var(--green)',role:'Quality check + Greetings'},
  {model:'mistral:7b',time:'1-2s',bar:75,color:'var(--blue)',role:'Default chat'},
  {model:'qwen2:7b',time:'1-2s',bar:70,color:'var(--orange)',role:'Classify + structured'},
  {model:'llama3:8b',time:'2-4s',bar:45,color:'var(--cyan)',role:'Deep + emotional'},
  {model:'llava',time:'4-8s',bar:20,color:'var(--purple)',role:'Image analysis'},
];

// ── VRAM ──
const vramItems = [
  {label:'phi3:mini',gb:2.2,color:'var(--green)',pct:36.7,always:true},
  {label:'mistral:7b',gb:4.4,color:'var(--blue)',pct:73.3,always:false},
  {label:'qwen2:7b',gb:4.4,color:'var(--orange)',pct:73.3,always:false},
  {label:'llama3:8b',gb:4.7,color:'var(--cyan)',pct:78.3,always:false},
  {label:'llava',gb:4.7,color:'var(--purple)',pct:78.3,always:false},
];


// ── Build pipeline ──
const pl = document.getElementById('pipeline');
steps.forEach((s,i) => {
  const div = document.createElement('div');
  div.className='pipe-step';
  div.innerHTML=`<div class="step-box" style="--step-color:${s.color}" onclick="this.parentElement.querySelector('.step-box').classList.toggle('open')">
    <div class="step-head">
      <span class="step-num">[${s.num}]</span>
      <span class="step-title">${s.title}</span>
      ${s.model?`<span class="step-model">${s.model}</span>`:''}
    </div>
    <div class="step-desc">${s.desc}</div>
    <div class="step-detail" style="white-space:pre-line">${s.detail}</div>
  </div>`;
  pl.appendChild(div);
  if(i < steps.length-1){
    const arr = document.createElement('div');
    arr.className='pipe-arrow';
    arr.innerHTML=`<svg class="arrow-svg" viewBox="0 0 24 20"><path d="M12 0 L12 14 M6 8 L12 14 L18 8" stroke="${s.color}" stroke-width="1.5" fill="none" opacity=".7"/></svg>`;
    pl.appendChild(arr);
  }
});

// ── Build model cards ──
const mg = document.getElementById('model-grid');
models.forEach(m => {
  const d = document.createElement('div');
  d.className='model-card';
  d.style.setProperty('--mc-color', m.color);
  d.style.setProperty('--mc-border', m.color.replace(')',',0.3)').replace('var(','rgba(').replace(/^rgba\(--[^,]+,/,'rgba(0,229,255,'));
  d.style.borderColor = m.color.replace(')',',0.25)').replace('var(--','rgba(0,229,255,').replace('cyan','229,255').replace('blue','102,255').replace('orange','255,106,0').replace('green','0,255,170').replace('purple','170,0,255');
  d.innerHTML=`<div class="mc-icon">${m.icon}</div>
    <div class="mc-name" style="color:${m.color}">${m.name}</div>
    <div class="mc-role">${m.role}</div>
    <div class="mc-vram">${m.vram}</div>`;
  d.title = 'Used when: ' + m.when;
  d.addEventListener('mouseenter', () => { d.style.background='color-mix(in srgb,'+m.color+' 8%,var(--bg3))'; });
  d.addEventListener('mouseleave', () => { d.style.background='var(--bg3)'; });
  mg.appendChild(d);
});

// ── VRAM bars ──
const vb = document.getElementById('vram-bars');
vramItems.forEach(item => {
  const row = document.createElement('div');
  row.className='vbar-row';
  const label = item.always ? item.label+' ★' : item.label;
  row.innerHTML=`<span class="vbar-label" style="color:${item.color}">${label}</span>
    <div class="vbar-track"><div class="vbar-fill" style="background:linear-gradient(90deg,var(--blue),${item.color});box-shadow:0 0 6px ${item.color}" data-pct="${item.pct}"></div></div>
    <span class="vbar-num" style="color:${item.color}">${item.gb}GB</span>`;
  vb.appendChild(row);
});
const tot = document.createElement('div');
tot.className='vram-total';
tot.innerHTML=`<span style="font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:var(--dim)">RTX 4050 TOTAL (pinned: phi3 2.2GB always)</span>
  <span style="font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--cyan)">6.0 GB</span>`;
vb.appendChild(tot);

// ── Route table ──
const rt = document.getElementById('route-table');
rt.innerHTML=`<thead><tr><th>CONDITION</th><th>ROUTES TO</th><th>TAGS</th></tr></thead>`;
const tbody = document.createElement('tbody');
routes.forEach(r => {
  const tr = document.createElement('tr');
  const tags = r.tags.map(t=>`<span class="tag" style="color:${r.color}">${t}</span>`).join('');
  tr.innerHTML=`<td>${r.condition}</td>
    <td><span style="font-family:'Orbitron',sans-serif;font-size:10px;color:${r.color}">${r.model}</span></td>
    <td>${tags}</td>`;
  tbody.appendChild(tr);
});
rt.appendChild(tbody);

// ── Perf cards ──
const pg = document.getElementById('perf-grid');
perfs.forEach(p => {
  const d = document.createElement('div');
  d.className='perf-card';
  d.innerHTML=`<div class="perf-model" style="color:${p.color}">${p.model}</div>
    <div class="perf-time" style="color:${p.color};text-shadow:0 0 16px ${p.color}33">${p.time}</div>
    <div class="perf-bar" style="background:linear-gradient(90deg,var(--blue),${p.color});width:${p.bar}%;box-shadow:0 0 6px ${p.color}55"></div>
    <div class="perf-role">${p.role}</div>`;
  pg.appendChild(d);
});

// ── Animate VRAM bars on load ──
setTimeout(() => {
  document.querySelectorAll('.vbar-fill').forEach(b => {
    b.style.width = b.dataset.pct + '%';
  });
}, 400);
</script>
</body>
</html>
