name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check --output-format=github .
      - name: ruff format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -e ".[dev]"
      - name: mypy
        run: mypy core/ --ignore-missing-imports --python-version=3.11

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install deps
        run: |
          pip install -e ".[dev]" pytest-timeout pytest-cov hypothesis
      - name: Unit tests
        run: |
          pytest tests/unit/ -v --tb=short -x --timeout=120 \
            -o "timeout_method=thread"

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install deps
        run: |
          pip install -e ".[dev]" pytest-timeout pytest-cov hypothesis
      - name: Coverage report
        run: |
          pytest tests/unit/ tests/contract/ --cov=core --cov=monitors \
            --cov-report=term-missing --cov-report=xml --cov-fail-under=60 \
            -x --timeout=120
