name: Python CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check --output-format=github .
      - name: ruff format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -r requirements.txt mypy
      - name: mypy
        run: mypy core/ --ignore-missing-imports --python-version=3.11

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt alembic
      - name: alembic check
        run: |
          JARVIS_DB__URL="sqlite+aiosqlite:///tmp/test_jarvis.db" alembic check
        shell: bash

  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install deps
        run: |
          pip install -r requirements.txt pytest-timeout
      - name: Unit tests
        run: |
          pytest tests/unit/ -v --tb=short -x --timeout=120 \
            -o "timeout_method=thread"

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Integration tests
        run: pytest tests/integration/ -v --tb=short -x --timeout=120

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          pip install -r requirements.txt pytest-cov hypothesis
      - name: Coverage
        run: |
          pytest tests/unit/ tests/contract/ --cov=core --cov=monitors \
            --cov-report=term-missing --cov-report=xml --cov-fail-under=60 \
            -x --timeout=120
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
