name: Python CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Install test dependencies
      run: |
        pip install pytest pytest-asyncio
    
    - name: Lint with flake8 (warnings only)
      continue-on-error: true
      run: |
        pip install flake8
        flake8 backend/ai_os --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/api --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run unit tests
      run: |
        pytest tests/test_ai_os.py -v --tb=short
    
    - name: Run E2E tests (with timeout)
      timeout-minutes: 5
      continue-on-error: true
      run: |
        pytest tests/test_ai_os_e2e.py -v --tb=short
    
    - name: Test imports
      run: |
        python -c "from backend.core.main import app; print('[OK] Backend imports OK')"
        python -c "from backend.ai_os.orchestrator import AIOrchestrator; print('[OK] Orchestrator imports OK')"
        python -c "from backend.ai_os.sandbox import get_sandbox; print('[OK] Sandbox imports OK')"
    
    - name: Run coverage report
      run: |
        pip install coverage
        coverage run -m pytest tests/test_ai_os.py --tb=short
        coverage report -m --skip-covered
    
    - name: Upload coverage to codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
