<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --c: #00D4FF;
  --c2: rgba(0,212,255,0.12);
  --c3: rgba(0,212,255,0.22);
  --gold: #FFB300;
  --green: #00FF88;
  --orange: #FF6B35;
  --red: #FF4444;
  --bg-dot: rgba(6,12,24,0.97);
}

body {
  width: 56px; height: 56px;
  background: transparent;
  overflow: hidden;
  user-select: none;
  font-family: -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
}

/* Island wrapper — expands on click */
#isl {
  position: absolute;
  top: 4px; left: 4px;
  height: 48px;
  min-width: 48px;
  border-radius: 24px;
  background: var(--bg-dot);
  border: 1.5px solid rgba(0,212,255,0.3);
  display: flex;
  align-items: center;
  overflow: hidden;
  transition:
    min-width .44s cubic-bezier(.34,1.56,.64,1),
    height    .44s cubic-bezier(.34,1.56,.64,1),
    border-radius .44s cubic-bezier(.34,1.56,.64,1),
    box-shadow .3s ease;
  box-shadow:
    0 0 0 1px rgba(0,212,255,0.06),
    0 0 18px rgba(0,212,255,0.22),
    0 6px 32px rgba(0,0,0,0.8);
  cursor: pointer;
  will-change: min-width, height, border-radius;
}

/* State glow */
#isl.s-thinking {
  border-color: rgba(255,107,53,0.5);
  box-shadow: 0 0 20px rgba(255,107,53,0.3), 0 6px 32px rgba(0,0,0,0.8);
  animation: think-pulse .9s ease infinite;
}
#isl.s-ready {
  border-color: rgba(0,255,136,0.5);
  box-shadow: 0 0 22px rgba(0,255,136,0.35), 0 6px 32px rgba(0,0,0,0.8);
}
#isl.s-error {
  border-color: rgba(255,68,68,0.5);
  box-shadow: 0 0 18px rgba(255,68,68,0.3), 0 6px 32px rgba(0,0,0,0.8);
}

@keyframes think-pulse {
  0%,100% { box-shadow: 0 0 20px rgba(255,107,53,0.3), 0 6px 32px rgba(0,0,0,0.8); }
  50%      { box-shadow: 0 0 36px rgba(255,107,53,0.55), 0 6px 32px rgba(0,0,0,0.8); }
}

/* Core dot button */
#core-btn {
  flex-shrink: 0;
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
}

.dot-face {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2px solid var(--c);
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-dot);
  transition: border-color .25s, box-shadow .25s, transform .15s, border-radius .4s;
  box-shadow: 0 0 10px rgba(0,212,255,0.3);
  overflow: hidden;
  position: relative;
}

.dot-face:hover { transform: scale(1.09); }

.dot-nub {
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--c);
  transition: background .25s, transform .2s;
}

/* Custom image overlay on dot */
#dot-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; border-radius: inherit;
  display: none;
}

/* ── Icon rail ── */
#rail {
  display: flex;
  align-items: center;
  gap: 1px;
  padding: 0 8px 0 0;
  opacity: 0;
  transform: scaleX(0.6) translateX(-10px);
  transform-origin: left;
  pointer-events: none;
  transition: opacity .22s ease .14s, transform .22s ease .14s;
  flex-shrink: 0;
}

#isl.open #rail {
  opacity: 1;
  transform: scaleX(1) translateX(0);
  pointer-events: all;
}

.ib {
  width: 38px; height: 38px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .14s, transform .12s;
  color: rgba(180,220,245,0.5);
  flex-shrink: 0;
  position: relative;
}
.ib:hover { background: rgba(0,212,255,0.1); color: var(--c); transform: scale(1.14); }
.ib.on    { background: rgba(0,212,255,0.13); color: var(--c); }

.ib svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

/* notification dot */
.ib .nb {
  position: absolute; top: 5px; right: 5px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--orange); border: 1.5px solid rgba(6,12,24,1);
}

.sep { width:1px; height:22px; background:rgba(0,212,255,0.12); margin: 0 2px; flex-shrink:0; }

/* State colors on nub / dot-face */
.s-thinking .dot-face { border-color:var(--orange); box-shadow:0 0 14px rgba(255,107,53,0.45); }
.s-thinking .dot-nub  { background:var(--orange); }
.s-ready    .dot-face { border-color:var(--green);  box-shadow:0 0 18px rgba(0,255,136,0.55); }
.s-ready    .dot-nub  { background:var(--green); }
.s-error    .dot-face { border-color:var(--red);    box-shadow:0 0 14px rgba(255,68,68,0.4); }
.s-error    .dot-nub  { background:var(--red); }
</style>
</head>
<body>

<div id="isl">
  <div id="core-btn">
    <div class="dot-face" id="df">
      <div class="dot-nub" id="dn"></div>
      <img id="dot-img" src="" alt=""/>
    </div>
  </div>

  <div id="rail">
    <div class="ib" id="r-files" title="Files">
      <svg viewBox="0 0 24 24"><path d="M3 6a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/></svg>
    </div>
    <div class="ib" id="r-music" title="Music">
      <svg viewBox="0 0 24 24"><circle cx="8" cy="18" r="3"/><circle cx="16" cy="16" r="3"/><path d="M11 18V8l8-2v10"/></svg>
    </div>
    <div class="ib" id="r-video" title="Video">
      <svg viewBox="0 0 24 24"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="m22 8-5 4 5 4V8z"/></svg>
    </div>
    <div class="sep"></div>
    <div class="ib" id="r-stocks" title="Markets">
      <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    </div>
    <div class="ib" id="r-news" title="News">
      <svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a4 4 0 0 1-4-4V6"/><path d="M8 6h8M8 10h8M8 14h4"/></svg>
      <div class="nb"></div>
    </div>
    <div class="ib" id="r-mail" title="Mail">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
      <div class="nb"></div>
    </div>
    <div class="ib" id="r-msgs" title="Messages">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div class="nb"></div>
    </div>
    <div class="sep"></div>
    <div class="ib" id="r-apps" title="Apps">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <div class="ib" id="r-activity" title="Activity Graph">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div class="ib" id="r-term" title="Terminal">
      <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
    </div>
    <div class="ib" id="r-jarvis" title="JARVIS Web UI" style="color:var(--c)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/><circle cx="12" cy="12" r="3" fill="rgba(0,212,255,0.2)" stroke="none"/></svg>
    </div>
    <div class="ib" id="r-sound" title="Sound">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    </div>
    <div class="ib" id="r-custom" title="Customize">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 0-14.14 0M4.93 19.07a10 10 0 0 0 14.14 0"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    </div>
  </div>
</div>

<script>
// ─── IPC bridge ───────────────────────────────────────────────────────────────
let ipc;
try {
  const { ipcRenderer } = require('electron');
  ipc = {
    send: (ch, ...a) => ipcRenderer.send(ch, ...a),
    on:   (ch, fn)   => ipcRenderer.on(ch, (_e, ...a) => fn(...a)),
    invoke: (ch, ...a) => ipcRenderer.invoke(ch, ...a),
  };
} catch {
  ipc = { send: () => {}, on: () => {}, invoke: async () => {} };
}

window.jarvis = {
  openPanel: view => ipc.send('open-panel', view),
  panelClose: () => ipc.send('panel-close'),
  dotVoice: () => ipc.send('dot-voice-trigger'),
  openUrl: url => ipc.send('open-jarvis-dashboard'),
  onSetState: fn => { window._stateFn = fn; },
  loadDotCfg: () => ipc.invoke('get-dot-config'),
  applyCfg: cfg => ipc.send('apply-dot-cfg', cfg),
  invoke: (ch, ...a) => ipc.invoke(ch, ...a),
};

const J   = window.jarvis;
const isl = document.getElementById('isl');
const df  = document.getElementById('df');
const dn  = document.getElementById('dn');
const img = document.getElementById('dot-img');

let open = false;
let locked = false;
let resetT = null;

// ── Mode state ────────────────────────────────────────────────────────────────
let dotMode = 'dot';   // 'dot' | 'bar'
let barOrient = 'h';   // 'h' | 'v'

// ── Resize window to match bar/dot mode ────────────────────────────────────────
function resizeWin() {
  let w = 56, h = 56;
  if (open && dotMode === 'bar') {
    if (barOrient === 'h') { w = 560; h = 56; }
    else { w = 56; h = 500; }
  }
  ipc.send('resize-dot', { w, h, mode: dotMode });
}

// ── Apply current mode/layout ──────────────────────────────────────────────────
function applyLayout() {
  const rail = document.getElementById('rail');
  isl.style.flexDirection = 'row';
  isl.style.borderRadius = '24px';
  if (rail) rail.style.flexDirection = 'row';
  if (open && dotMode === 'bar') {
    isl.classList.add('open');
    if (barOrient === 'h') {
      isl.style.minWidth = '530px';
      isl.style.height = '48px';
    } else {
      isl.style.minWidth = '48px';
      isl.style.height = 'auto';
      if (rail) rail.style.flexDirection = 'column';
    }
  } else {
    isl.classList.remove('open');
    isl.style.minWidth = '';
    isl.style.height = '48px';
  }
  resizeWin();
}

// ── Drag: only right-hold ──────────────────────────────────────────────────────
let dragState = null;
const DRAG_THRESHOLD = 4;

document.getElementById('isl').addEventListener('mousedown', e => {
  if (locked) return;
  if (e.button !== 2) return;  // only right button drags
  if (e.target.closest('.ib') || e.target.closest('#ph-close')) return;
  dragState = {
    startX: e.screenX, startY: e.screenY,
    winX: window.screenX, winY: window.screenY,
    moved: false,
  };
});

document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const dx = e.screenX - dragState.startX;
  const dy = e.screenY - dragState.startY;
  if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) {
    if (!dragState.moved) dragState.moved = true;
    ipc.send('window-drag', { x: dragState.winX + dx, y: dragState.winY + dy });
  }
});

document.addEventListener('mouseup', e => {
  if (!dragState) {
    if (e.button === 2) {
      locked = !locked;
      ipc.send('save-dot-lock', locked);
      isl.style.borderColor = locked ? 'rgba(255,179,0,0.5)' : '';
      isl.style.cursor = locked ? 'default' : 'pointer';
      return;
    }
  }

  const wasDrag = dragState?.moved;
  dragState = null;
  if (wasDrag) return;

  // ONLY toggle if clicking the core button itself, not the rail
  if (e.button !== 0) return;
  if (!e.target.closest('#core-btn')) return;
  if (locked) return;

  open = !open;
  dotMode = open ? 'bar' : 'dot';
  applyLayout();
  if (!open) J.panelClose();
});

// Prevent native context menu
document.addEventListener('contextmenu', e => e.preventDefault());

// Double-click: screen understand
document.addEventListener('dblclick', e => {
  if (locked) return;
  if (e.target.closest('#core-btn') || e.target.closest('#isl')) {
    J.dotVoice();
  }
});

// ── Rail buttons ──────────────────────────────────────────────────────────────
const views = {
  'r-files':  'files',
  'r-music':  'music',
  'r-video':  'video',
  'r-stocks': 'stocks',
  'r-news':   'news',
  'r-mail':   'mail',
  'r-msgs':   'msgs',
  'r-apps':   'apps',
  'r-term':   'term',
  'r-sound':  'sound',
  'r-custom': 'custom',
};

Object.entries(views).forEach(([btnId, view]) => {
  document.getElementById(btnId)?.addEventListener('click', e => {
    e.stopPropagation();
    const btn = document.getElementById(btnId);
    const wasOn = btn.classList.contains('on');
    document.querySelectorAll('.ib.on').forEach(b => b.classList.remove('on'));
    if (!wasOn) { btn.classList.add('on'); J.openPanel(view); }
    else J.panelClose();
    resizeWin();  // ensure window is correct size after interaction
  });
});

document.getElementById('r-jarvis')?.addEventListener('click', e => {
  e.stopPropagation();
  J.openUrl('http://localhost:8000');
});

// ── State from main ───────────────────────────────────────────────────────────
ipc.on('set-state', state => {
  isl.classList.remove('s-thinking','s-ready','s-error');
  df.classList.remove('s-thinking','s-ready','s-error');
  if (state !== 'idle') { isl.classList.add('s-'+state); df.classList.add('s-'+state); }
  clearTimeout(resetT);
  if (state === 'thinking') resetT = setTimeout(() => { isl.classList.remove('s-thinking'); df.classList.remove('s-thinking'); }, 15000);
  if (state === 'ready')    resetT = setTimeout(() => { isl.classList.remove('s-ready');   df.classList.remove('s-ready');   }, 5000);
  if (window._stateFn) window._stateFn(state);
});

// ── Panel closed from main ────────────────────────────────────────────────────
ipc.on('panel-closed', () => {
  document.querySelectorAll('.ib.on').forEach(b => b.classList.remove('on'));
});

// ── Config apply from panel ───────────────────────────────────────────────────
ipc.on('apply-cfg', cfg => {
  if (cfg.color) {
    document.documentElement.style.setProperty('--c', cfg.color);
    document.documentElement.style.setProperty('--c2', hexAlpha(cfg.color, 0.12));
    document.documentElement.style.setProperty('--c3', hexAlpha(cfg.color, 0.22));
  }
  if (cfg.bg) {
    document.documentElement.style.setProperty('--bg-dot', cfg.bg);
    isl.style.background = cfg.bg;
  }
  if (cfg.text) {
    // Text color only affects panel, not dot (dot has no text)
  }
  if (cfg.shape) {
    const r = { circle:'50%', squircle:'38%', rect:'22%' }[cfg.shape] || '50%';
    df.style.borderRadius = r; img.style.borderRadius = r;
  }
  if (cfg.size) {
    df.style.width = cfg.size+'px'; df.style.height = cfg.size+'px';
  }
  if (cfg.img) {
    img.src = cfg.img; img.style.display = 'block'; dn.style.display = 'none';
  } else if (cfg.img === null) {
    img.style.display = 'none'; dn.style.display = '';
  }
  if (cfg.mode !== undefined) {
    dotMode = cfg.mode;
    open = (dotMode === 'bar');
    applyLayout();
  }
  if (cfg.orient !== undefined) {
    barOrient = cfg.orient;
    applyLayout();
  }
});

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Restore saved config ──────────────────────────────────────────────────────
J.loadDotCfg().then(cfg => {
  if (cfg?.color) {
    document.documentElement.style.setProperty('--c', cfg.color);
    document.documentElement.style.setProperty('--c2', hexAlpha(cfg.color, 0.12));
    document.documentElement.style.setProperty('--c3', hexAlpha(cfg.color, 0.22));
  }
  if (cfg?.shape) {
    const r = { circle:'50%', squircle:'38%', rect:'22%' }[cfg.shape] || '50%';
    df.style.borderRadius = r; img.style.borderRadius = r;
  }
  if (cfg?.size) {
    df.style.width = cfg.size+'px'; df.style.height = cfg.size+'px';
  }
  if (cfg?.img) {
    img.src = cfg.img; img.style.display = 'block'; dn.style.display = 'none';
  }
  if (cfg?.mode) { dotMode = cfg.mode; }
  if (cfg?.orient) { barOrient = cfg.orient; }
  // Restore lock state
  if (cfg?.locked) {
    locked = true;
    isl.style.borderColor = 'rgba(255,179,0,0.5)';
    isl.style.cursor = 'default';
  }
  open = (dotMode === 'bar');
  applyLayout();
});
</script>
</body>
</html>
