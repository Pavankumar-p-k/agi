name: jarvis_app
description: JARVIS — Personal AI Life Operating System
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.4.3
  web_socket_channel: ^2.4.0

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  firebase_core: ^2.16.0

  # UI & Animations
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7

  # Audio
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  audio_session: ^0.1.18
  on_audio_query: ^2.9.0
  record: ^6.1.0
  audioplayers: ^6.1.0

  # Notifications
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2
  flutter_tts: ^4.0.2
  speech_to_text: ^7.3.0

  # Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # File Manager
  file_picker: ^8.0.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  google_fonts:
    path: local_overrides/google_fonts

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
